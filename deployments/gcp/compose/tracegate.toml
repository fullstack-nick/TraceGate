[server]
listen = "0.0.0.0:8080"

[logging]
json = true

[[routes]]
id = "users"
hosts = ["*"]
path_prefix = "/api/users"
upstreams = ["http://users-service:3000"]
timeout_ms = 3000
retries = 1

[[routes]]
id = "payments"
hosts = ["*"]
path_prefix = "/api/payments"
upstreams = ["http://payments-service:4000"]
timeout_ms = 3000
retries = 0
