services:
  tracegate:
    image: ${TRACEGATE_IMAGE}
    container_name: tracegate
    command: ["tracegate", "serve", "--config", "/etc/tracegate/tracegate.toml"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/tracegate/tracegate.toml:/etc/tracegate/tracegate.toml:ro
      - /opt/tracegate/data:/var/lib/tracegate
    depends_on:
      - otel-collector
      - users-service
      - payments-service
      - replay-target

  users-service:
    image: ${TRACEGATE_IMAGE}
    container_name: tracegate-users-service
    command: ["tracegate-demo-backend", "--service", "users", "--listen", "0.0.0.0:3000"]
    restart: unless-stopped
    expose:
      - "3000"

  payments-service:
    image: ${TRACEGATE_IMAGE}
    container_name: tracegate-payments-service
    command: ["tracegate-demo-backend", "--service", "payments", "--listen", "0.0.0.0:4000"]
    restart: unless-stopped
    expose:
      - "4000"

  replay-target:
    image: ${TRACEGATE_IMAGE}
    container_name: tracegate-replay-target
    command: ["tracegate-demo-backend", "--service", "replay", "--listen", "0.0.0.0:4000"]
    restart: unless-stopped
    expose:
      - "4000"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0
    container_name: tracegate-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    restart: unless-stopped
    volumes:
      - /opt/tracegate/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
    container_name: tracegate-jaeger
    restart: unless-stopped
    expose:
      - "16686"
      - "4317"

  prometheus:
    image: prom/prometheus:v3.13.0
    container_name: tracegate-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    restart: unless-stopped
    volumes:
      - /opt/tracegate/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - tracegate

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: tracegate-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboard-definitions/tracegate-overview.json
    volumes:
      - /opt/tracegate/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
