name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tracegate
          POSTGRES_PASSWORD: tracegate
          POSTGRES_DB: tracegate_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U tracegate -d tracegate_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CARGO_TERM_COLOR: always
      TRACEGATE_TEST_POSTGRES_URL: postgres://tracegate:tracegate@localhost:55432/tracegate_test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy, llvm-tools-preview
          targets: wasm32-wasip2
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: PostgreSQL storage tests
        run: cargo test -p tracegate-storage
      - name: Build example plugins
        run: |
          cargo build --manifest-path examples/plugins/api-key-guard/Cargo.toml --target wasm32-wasip2 --release
          cargo build --manifest-path examples/plugins/header-normalizer/Cargo.toml --target wasm32-wasip2 --release
      - name: Plugin contract checks
        run: |
          cargo run -p tracegate -- plugins inspect examples/plugins/api-key-guard/target/wasm32-wasip2/release/tracegate_api_key_guard.wasm --json
          cargo run -p tracegate -- plugins inspect examples/plugins/header-normalizer/target/wasm32-wasip2/release/tracegate_header_normalizer.wasm --json
      - name: Coverage artifact
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
      - name: Benchmark smoke
        run: cargo bench -p tracegate-proxy --bench release_overhead -- --sample-size 10 --measurement-time 1 --warm-up-time 1
