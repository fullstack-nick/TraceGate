services:
  tracegate:
    build:
      context: .
      args:
        TRACEGATE_GIT_SHA: ${TRACEGATE_GIT_SHA:-local}
    image: tracegate:${TRACEGATE_IMAGE_TAG:-local}
    command: ["tracegate", "serve", "--config", "/etc/tracegate/tracegate.toml"]
    environment:
      TRACEGATE_ADMIN_TOKEN: tracegate-local-admin
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./examples/tracegate.toml:/etc/tracegate/tracegate.toml:ro
      - ./data:/var/lib/tracegate
    depends_on:
      - otel-collector
      - users-service
      - payments-service
      - replay-target

  users-service:
    image: tracegate:${TRACEGATE_IMAGE_TAG:-local}
    command: ["tracegate-demo-backend", "--service", "users", "--listen", "0.0.0.0:3000"]
    expose:
      - "3000"

  payments-service:
    image: tracegate:${TRACEGATE_IMAGE_TAG:-local}
    command: ["tracegate-demo-backend", "--service", "payments", "--listen", "0.0.0.0:4000"]
    expose:
      - "4000"

  replay-target:
    image: tracegate:${TRACEGATE_IMAGE_TAG:-local}
    command: ["tracegate-demo-backend", "--service", "replay", "--listen", "0.0.0.0:4000"]
    ports:
      - "4000:4000"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deployments/gcp/compose/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.19.0
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:v3.13.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    ports:
      - "9091:9090"
    volumes:
      - ./deployments/gcp/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - tracegate

  grafana:
    image: grafana/grafana-oss:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboard-definitions/tracegate-overview.json
    ports:
      - "3000:3000"
    volumes:
      - ./deployments/gcp/compose/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
